version: "3.9"

services:
  db:
    image: postgres:16
    container_name: parser_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parser
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: parser/Dockerfile.parser
    container_name: parser_app
    restart: unless-stopped

    depends_on:
      - db

    ports:
      - "${PORT:-8080}:8080"

    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/parser?sslmode=disable
      PORT: 8080
      LOG_LEVEL: info

    volumes:
      - ./data:/app/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: parser_pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  pgdata: